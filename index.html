<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Battle Pass Calculator PRO</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: #fff;
  padding: 20px;
  max-width: 520px;
  margin: auto;
}

h2 { color: gold; }

.box {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  border: none;
}

button {
  background: gold;
  font-weight: bold;
  cursor: pointer;
}

.result { line-height: 1.6; }
</style>
</head>

<body>

<h2>🔥 Battle Pass Calculator PRO</h2>

<div class="box">
เลเวลปัจจุบัน:
<input type="number" id="current" value="0">

เลเวลเป้าหมาย:
<input type="number" id="target" value="100">

วันที่ทำ Weekly ล่าสุด:
<input type="date" id="lastWeekly">
</div>

<div class="box">
<h3>🟡 Daily</h3>
✔ ฆ่ามอน (20/วัน)<br>

<input type="checkbox" id="dailyMoney"> เควสเงิน (+30)<br>
ทำกี่วัน:
<input type="number" id="dailyDays" value="999">
</div>

<div class="box">
<h3>🔵 Weekly</h3>
✔ ฆ่าบอส (+70)<br>

<input type="checkbox" id="weeklyMoney"> เควสเงิน (+30)<br>
ทำกี่สัปดาห์:
<input type="number" id="weeklyWeeks" value="999">
</div>

<button onclick="calc()">คำนวณ</button>

<div class="box result" id="result">
กรอกข้อมูลแล้วกดคำนวณ
</div>

<script>
function levelToExp(level){
  if(level <= 0) return 0;
  return 50 + (level - 1) * 10;
}

function calc(){
  let current = Number(currentEl.value);
  let target = Number(targetEl.value);
  let lastWeekly = new Date(lastWeeklyEl.value);

  let useDailyMoney = dailyMoneyEl.checked;
  let dailyMoneyDays = Number(dailyDaysEl.value);

  let useWeeklyMoney = weeklyMoneyEl.checked;
  let weeklyMoneyWeeks = Number(weeklyWeeksEl.value);

  let start = new Date("2026-04-22");
  let end = new Date("2026-06-24");

  let today = new Date(start);
  let exp = levelToExp(current);
  let targetExp = levelToExp(target);

  let days = 0;
  let weeklyCount = 0;

  while(exp < targetExp && today <= end){
    days++;

    // DAILY
    exp += 20;
    if(useDailyMoney && days <= dailyMoneyDays){
      exp += 30;
    }

    // WEEKLY
    let diff = Math.floor((today - lastWeekly) / (1000*60*60*24));

    if(diff >= 7){
      let times = Math.floor(diff / 7);

      for(let i=0;i<times;i++){
        if(today > end) break;

        exp += 70;

        if(useWeeklyMoney && weeklyCount < weeklyMoneyWeeks){
          exp += 30;
        }

        weeklyCount++;
        lastWeekly.setDate(lastWeekly.getDate() + 7);
      }
    }

    today.setDate(today.getDate() + 1);
  }

  let success = exp >= targetExp;
  let missing = Math.max(0, targetExp - exp);
  let missingLevel = Math.ceil(missing / 10);

  result.innerHTML = `
📅 ถึงเลเวลวันที่: ${today.toLocaleDateString()}<br><br>

📦 แต้มทั้งหมดที่มี: ${exp}<br>
🎯 แต้มที่ต้องใช้: ${targetExp}<br><br>

❗ ขาดอีก: ${missing} แต้ม<br>
📈 = ${missingLevel} เลเวล<br><br>

⏳ ใช้เวลา: ${days} วัน<br>
🔁 Weekly ทำ: ${weeklyCount} ครั้ง<br><br>

🎯 สถานะ: ${success ? "ทัน ✅" : "ไม่ทัน ❌"}
  `;

  // แชร์ลิงก์
  let url = `?c=${current}&t=${target}&lw=${lastWeeklyEl.value}&dm=${useDailyMoney}&dd=${dailyMoneyDays}&wm=${useWeeklyMoney}&ww=${weeklyMoneyWeeks}`;
  history.pushState({}, "", url);
}

// bind
const currentEl = document.getElementById("current");
const targetEl = document.getElementById("target");
const lastWeeklyEl = document.getElementById("lastWeekly");

const dailyMoneyEl = document.getElementById("dailyMoney");
const dailyDaysEl = document.getElementById("dailyDays");

const weeklyMoneyEl = document.getElementById("weeklyMoney");
const weeklyWeeksEl = document.getElementById("weeklyWeeks");

const result = document.getElementById("result");

// load จากลิงก์
window.onload = () => {
  let p = new URLSearchParams(location.search);

  if(p.get("c")){
    currentEl.value = p.get("c");
    targetEl.value = p.get("t");
    lastWeeklyEl.value = p.get("lw");

    dailyMoneyEl.checked = p.get("dm") === "true";
    dailyDaysEl.value = p.get("dd");

    weeklyMoneyEl.checked = p.get("wm") === "true";
    weeklyWeeksEl.value = p.get("ww");

    calc();
  }
}
</script>

</body>
</html>
